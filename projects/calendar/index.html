<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麦序日历</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #2c2c2c; --ink-light: #5a5a5a; --ink-faint: #9a9080;
    --paper: #faf8f4; --paper-warm: #f0ebe0;
    --holiday-bg: #e8f4ec; --holiday-text: #2e7d4f;
    --workday-bg: #fde8e6; --workday-text: #b03020;
    --gold: #b8922a; --gold-bg: #fdf3d8;
    --weekend: #6b8fa0;
    --today-bg: #2c2c2c;
  }
  body {
    font-family: 'Noto Serif SC', 'STSong', serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem 4rem;
  }
  .back-link {
    position: fixed; top: 1rem; left: 1rem;
    font-size: 0.85rem; color: var(--ink-faint);
    text-decoration: none; letter-spacing: 0.05em; z-index: 100;
  }
  .back-link:hover { color: var(--ink); }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.4em; margin-bottom: 0.4rem; }
  header .subtitle { font-size: 0.82rem; color: var(--ink-faint); letter-spacing: 0.2em; }
  .nav { display: flex; align-items: center; gap: 2.5rem; margin-bottom: 2rem; }
  .nav button {
    background: none; border: none; cursor: pointer;
    font-size: 1.1rem; color: var(--ink-light); padding: 0.4rem 0.8rem;
    transition: color 0.2s; border-radius: 4px;
  }
  .nav button:hover { color: var(--ink); background: var(--paper-warm); }
  .nav .month-label { font-size: 1.2rem; font-weight: 400; letter-spacing: 0.15em; min-width: 9rem; text-align: center; }
  .today-btn {
    background: none; border: 1px solid var(--ink-faint); border-radius: 4px;
    cursor: pointer; font-family: inherit; font-size: 0.82rem;
    color: var(--ink-light); padding: 0.2rem 0.6rem; letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .today-btn:hover { border-color: var(--ink); color: var(--ink); }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 0.6rem; }
  .weekdays span {
    text-align: center; font-size: 0.78rem; color: var(--ink-faint);
    letter-spacing: 0.05em; padding: 0.4rem 0; font-weight: 400;
  }
  .weekdays span:first-child { color: #b03020; }
  .weekdays span:last-child { color: var(--weekend); }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

  /* Base day cell */
  .day {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 6px; cursor: pointer;
    transition: opacity 0.15s, box-shadow 0.15s;
    padding: 4px 2px; gap: 2px;
  }
  .day.empty { pointer-events: none; }
  .day:not(.empty):hover { opacity: 0.85; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }

  .day .num { font-size: 1.15rem; font-weight: 500; line-height: 1; }
  .day .lunar { font-size: 0.68rem; line-height: 1; color: inherit; opacity: 0.7; }
  .day .jieqi { font-size: 0.68rem; line-height: 1; color: inherit; opacity: 0.7; font-weight: 600; }

  /* Normal */
  .day.normal .num { color: var(--ink); }

  .day.selected { outline: 2px solid var(--gold); outline-offset: 1px; }
  .day.today.selected { outline: 2px solid var(--gold); outline-offset: 1px; }

  /* Holiday — green fill */
  .day.holiday { background: var(--holiday-bg); }
  .day.holiday .num { color: var(--holiday-text); font-weight: 600; }
  .day.holiday .lunar { color: var(--holiday-text); }

  /* Workday (调休补班) — red fill */
  .day.workday { background: var(--workday-bg); }
  .day.workday .num { color: var(--workday-text); font-weight: 600; }
  .day.workday .lunar { color: var(--workday-text); }

  /* Today — dark fill */
  .day.today { background: var(--today-bg) !important; }
  .day.today .num { color: #faf8f4; font-weight: 400; }
  .day.today .lunar { color: rgba(255,255,255,0.5); opacity: 1; }
  .day.today .jieqi { color: var(--gold); }

  /* Legend */
  .calendar-wrap { width: 100%; max-width: 640px; }
  .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.78rem; color: var(--ink-light); }
  .legend-swatch { width: 22px; height: 14px; border-radius: 3px; }

  .divider { width: 60px; height: 1px; background: var(--ink-faint); margin: 1.5rem auto; opacity: 0.3; }

  .info-panel {
    max-width: 640px; width: 100%; margin-top: 1rem;
    background: var(--paper-warm); border-left: 3px solid var(--gold);
    padding: 1rem 1.5rem; border-radius: 0 6px 6px 0;
    font-size: 0.88rem; color: var(--ink-light);
    display: none;
  }
  .info-panel.active { display: block; }
  .upcoming-item {
    display: flex; align-items: baseline; gap: 1rem;
    padding: 0.7rem 0; border-bottom: 1px solid var(--paper-warm);
    cursor: pointer; transition: opacity 0.15s;
  }
  .upcoming-item:hover { opacity: 0.7; }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-name { font-size: 0.95rem; color: var(--ink); min-width: 4rem; }
  .upcoming-date { font-size: 0.82rem; color: var(--ink-light); }
  .upcoming-days { margin-left: auto; font-size: 0.82rem; color: var(--holiday-text); background: var(--holiday-bg); padding: 2px 8px; border-radius: 10px; }
</style>
</head>
<body>
<a class="back-link" href="../../index.html">← 主页</a>

<header>
  <h1>麦序日历</h1>
</header>

<div class="nav">
  <button onclick="changeMonth(-1)">◁</button>
  <div class="month-label" id="monthLabel"></div>
  <button onclick="changeMonth(1)">▷</button>
  <button class="today-btn" onclick="goToday()">今</button>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span style="color:#b03020">日</span>
  </div>
  <div class="days" id="daysGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:var(--holiday-bg);border:1px solid #b8dfc4"></div>法定假日</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--workday-bg);border:1px solid #f0c4be"></div>调休补班</div>
</div>
<div class="info-panel" id="infoPanel"></div>

<div class="upcoming-wrap" style="max-width:640px;width:100%;margin-top:1.5rem">
  <div style="font-size:0.82rem;color:var(--ink-faint);letter-spacing:0.15em;margin-bottom:0.8rem">即将放假</div>
  <div id="upcomingList"></div>
</div>

<script>
const HOLIDAYS = {
  "2025-01-01":{name:"元旦"},"2025-01-28":{name:"春节"},"2025-01-29":{name:"春节"},
  "2025-01-30":{name:"春节"},"2025-01-31":{name:"春节"},"2025-02-01":{name:"春节"},
  "2025-02-02":{name:"春节"},"2025-02-03":{name:"春节"},"2025-02-04":{name:"春节"},
  "2025-04-04":{name:"清明"},"2025-04-05":{name:"清明"},"2025-04-06":{name:"清明"},
  "2025-05-01":{name:"劳动节"},"2025-05-02":{name:"劳动节"},"2025-05-03":{name:"劳动节"},
  "2025-05-04":{name:"劳动节"},"2025-05-05":{name:"劳动节"},
  "2025-05-31":{name:"端午"},"2025-06-01":{name:"端午"},"2025-06-02":{name:"端午"},
  "2025-10-01":{name:"国庆"},"2025-10-02":{name:"国庆"},"2025-10-03":{name:"国庆"},
  "2025-10-04":{name:"国庆"},"2025-10-05":{name:"国庆"},"2025-10-06":{name:"国庆/中秋"},
  "2025-10-07":{name:"国庆"},
  "2026-01-01":{name:"元旦"},
  "2026-02-17":{name:"春节"},"2026-02-18":{name:"春节"},"2026-02-19":{name:"春节"},
  "2026-02-20":{name:"春节"},"2026-02-21":{name:"春节"},"2026-02-22":{name:"春节"},
  "2026-02-23":{name:"春节"},
  "2026-04-04":{name:"清明"},"2026-04-05":{name:"清明"},"2026-04-06":{name:"清明"},
  "2026-05-01":{name:"劳动节"},"2026-05-02":{name:"劳动节"},"2026-05-03":{name:"劳动节"},
  "2026-05-04":{name:"劳动节"},"2026-05-05":{name:"劳动节"},
  "2026-06-19":{name:"端午"},"2026-06-20":{name:"端午"},"2026-06-21":{name:"端午"},
  "2026-09-25":{name:"中秋"},"2026-09-26":{name:"中秋"},"2026-09-27":{name:"中秋"},
  "2026-10-01":{name:"国庆"},"2026-10-02":{name:"国庆"},"2026-10-03":{name:"国庆"},
  "2026-10-04":{name:"国庆"},"2026-10-05":{name:"国庆"},"2026-10-06":{name:"国庆"},
  "2026-10-07":{name:"国庆"},
};
const WORKDAYS = {
  "2025-01-26":"春节调休","2025-02-08":"春节调休","2025-04-27":"劳动节调休",
  "2025-09-28":"国庆调休","2025-10-11":"国庆调休",
  "2026-02-15":"春节调休","2026-02-28":"春节调休","2026-05-09":"劳动节调休",
  "2026-10-10":"国庆调休",
};
const JIEQI = {
  "2025-01-05":"小寒","2025-01-20":"大寒","2025-02-03":"立春","2025-02-18":"雨水",
  "2025-03-05":"惊蛰","2025-03-20":"春分","2025-04-04":"清明","2025-04-20":"谷雨",
  "2025-05-05":"立夏","2025-05-21":"小满","2025-06-05":"芒种","2025-06-21":"夏至",
  "2025-07-07":"小暑","2025-07-22":"大暑","2025-08-07":"立秋","2025-08-22":"处暑",
  "2025-09-07":"白露","2025-09-22":"秋分","2025-10-08":"寒露","2025-10-23":"霜降",
  "2025-11-07":"立冬","2025-11-22":"小雪","2025-12-07":"大雪","2025-12-22":"冬至",
  "2026-01-05":"小寒","2026-01-20":"大寒","2026-02-04":"立春","2026-02-19":"雨水",
  "2026-03-06":"惊蛰","2026-03-21":"春分","2026-04-05":"清明","2026-04-20":"谷雨",
  "2026-05-05":"立夏","2026-05-21":"小满","2026-06-06":"芒种","2026-06-21":"夏至",
  "2026-07-07":"小暑","2026-07-23":"大暑","2026-08-07":"立秋","2026-08-23":"处暑",
  "2026-09-08":"白露","2026-09-23":"秋分","2026-10-08":"寒露","2026-10-23":"霜降",
  "2026-11-07":"立冬","2026-11-22":"小雪","2026-12-07":"大雪","2026-12-22":"冬至",
};

const today = new Date();
let curYear = today.getFullYear(), curMonth = today.getMonth();

function pad(n){ return String(n).padStart(2,'0'); }
function key(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

const LUNAR_DAYS = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function getLunar(date){
  try {
    const fmt = new Intl.DateTimeFormat('zh-CN-u-ca-chinese',{month:'long',day:'numeric'});
    const parts = fmt.formatToParts(date);
    let month='', dayRaw='';
    for(const p of parts){
      if(p.type==='month') month=p.value;
      if(p.type==='day') dayRaw=p.value;
    }
    // dayRaw 可能是"初二"也可能是"2"，统一转为中文
    const dayNum = parseInt(dayRaw);
    const dayCN = (!isNaN(dayNum) && dayNum>=1 && dayNum<=30) ? LUNAR_DAYS[dayNum-1] : dayRaw;
    return dayCN==='初一' ? (month+'月') : dayCN;
  } catch(e){ return ''; }
}

function goToday() {
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  render();
  document.getElementById('infoPanel').classList.remove('active');
  const todayEl = document.querySelector('.day.today');
  if (todayEl) todayEl.click();
}

function jumpTo(year, month, day) {
  curYear = year;
  curMonth = month;
  render();
  document.getElementById('infoPanel').classList.remove('active');
  // 找到对应日格子并点击
  const cells = document.querySelectorAll('.day:not(.empty)');
  for (const cell of cells) {
    if (parseInt(cell.querySelector('.num').textContent) === day) {
      cell.click();
      cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
    }
  }
}

function renderUpcoming(){
  const list = document.getElementById('upcomingList');
  // collect holiday groups: find first day of each holiday block after today
  const todayKey = key(today.getFullYear(), today.getMonth(), today.getDate());
  const seen = new Set();
  const upcoming = [];
  // scan next 400 days
  for(let i=0; i<400; i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const k = key(d.getFullYear(), d.getMonth(), d.getDate());
    if(HOLIDAYS[k]){
      const name = HOLIDAYS[k].name;
      if(!seen.has(name)){
        seen.add(name);
        // count consecutive days
        let count=0, dd=new Date(d);
        while(true){
          const kk=key(dd.getFullYear(),dd.getMonth(),dd.getDate());
          if(HOLIDAYS[kk]&&HOLIDAYS[kk].name===name){ count++; dd.setDate(dd.getDate()+1); }
          else break;
        }
        const diff = Math.round((d-today)/(1000*60*60*24));
        upcoming.push({name, date:d, count, diff});
        if(upcoming.length>=5) break;
      }
    }
  }
  if(!upcoming.length){ list.innerHTML='<div style="color:var(--ink-faint);font-size:0.85rem">暂无数据</div>'; return; }
  list.innerHTML = upcoming.map(u=>{
    const mo = u.date.getMonth()+1, da = u.date.getDate();
    const diffText = u.diff===0 ? '今天' : u.diff===1 ? '明天' : `${u.diff} 天后`;
    return `<div class="upcoming-item" style="cursor:pointer" onclick="jumpTo(${u.date.getFullYear()},${u.date.getMonth()},${u.date.getDate()})">
      <span class="upcoming-name">${u.name}</span>
      <span class="upcoming-date">${u.date.getFullYear()}年${mo}月${da}日起 · ${u.count}天</span>
      <span class="upcoming-days">${diffText}</span>
    </div>`;
  }).join('');
}

function render(){
  document.getElementById('monthLabel').textContent = `${curYear} 年 ${curMonth+1} 月`;
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  // 周一为首列：原 getDay() 0=Sun→6, 1=Mon→0 ... 6=Sat→5
  const firstDowRaw = new Date(curYear, curMonth, 1).getDay();
  const firstDay = (firstDowRaw + 6) % 7; // shift so Mon=0
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div'); el.className='day empty'; grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const k=key(curYear,curMonth,d);
    const date=new Date(curYear,curMonth,d);
    const dow=date.getDay();
    const isToday=(curYear===today.getFullYear()&&curMonth===today.getMonth()&&d===today.getDate());
    const holiday=HOLIDAYS[k], workday=WORKDAYS[k], jieqi=JIEQI[k];
    const isWeekend=(dow===0||dow===6)&&!workday&&!holiday; // Sun=0, Sat=6
    const lunar=getLunar(date);

    const el=document.createElement('div');
    let cls='day';
    if(isToday) cls+=' today';
    else if(holiday) cls+=' holiday';
    else if(workday) cls+=' workday';
    else if(isWeekend) cls+=' weekend';
    else cls+=' normal';
    el.className=cls;

    const subLine = jieqi ? '<span class="jieqi">'+jieqi+'</span>' : lunar;
    el.innerHTML='<span class="num">'+d+'</span><span class="lunar">'+subLine+'</span>';

    el.addEventListener('click',()=>{
      document.querySelectorAll('.day.selected').forEach(e=>e.classList.remove('selected'));
      el.classList.add('selected');
      showInfo(date,k,holiday,workday,jieqi,lunar);
    });
    grid.appendChild(el);
  }
}

function showInfo(date,k,holiday,workday,jieqi,lunar){
  const weeks=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  let html=`<div class="info-title">${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日　${weeks[date.getDay()]}</div>`;
  html+=`<div class="info-row" style="color:var(--ink-faint)">农历 ${lunar}</div>`;
  if(jieqi) html+=`<div class="info-row" style="color:var(--ink-light)">节气：${jieqi}</div>`;
  if(holiday) html+=`<div class="info-row" style="color:var(--holiday-text)">法定假日：${holiday.name}</div>`;
  if(workday) html+=`<div class="info-row" style="color:var(--workday-text)">调休补班：${workday}</div>`;
  const panel = document.getElementById('infoPanel');
  panel.innerHTML=html;
  panel.classList.add('active');
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
  document.getElementById('infoPanel').classList.remove('active');
}

render();
renderUpcoming();
// auto select today
const todayEl = document.querySelector('.day.today');
if(todayEl) todayEl.click();
</script>
</body>
</html>
