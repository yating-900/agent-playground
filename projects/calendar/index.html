<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅历 · 中华节假日日历</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #2c2c2c; --ink-light: #6b6b6b; --ink-faint: #b0a898;
    --paper: #faf8f4; --paper-warm: #f3efe8;
    --red: #c0392b; --red-soft: #e8c4be;
    --gold: #c9a84c; --green: #4a7c59; --accent: #7b9e87;
  }
  body {
    font-family: 'Noto Serif SC', 'STSong', serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1rem 4rem;
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.3em; margin-bottom: 0.3rem; }
  header .subtitle { font-size: 0.8rem; color: var(--ink-faint); letter-spacing: 0.2em; }
  .nav { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }
  .nav button {
    background: none; border: none; cursor: pointer;
    font-size: 1.2rem; color: var(--ink-light); padding: 0.3rem 0.6rem; transition: color 0.2s;
  }
  .nav button:hover { color: var(--ink); }
  .nav .month-label { font-size: 1.3rem; font-weight: 300; letter-spacing: 0.2em; min-width: 9rem; text-align: center; }
  .calendar-wrap { width: 100%; max-width: 680px; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 0.5rem; }
  .weekdays span { text-align: center; font-size: 0.75rem; color: var(--ink-faint); letter-spacing: 0.1em; padding: 0.4rem 0; }
  .weekdays span:first-child { color: var(--red); }
  .weekdays span:last-child { color: var(--accent); }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; border-radius: 4px;
    cursor: default; position: relative; transition: background 0.15s; padding: 2px;
  }
  .day:not(.empty):hover { background: var(--paper-warm); cursor: pointer; }
  .day.empty { pointer-events: none; }
  .day .num { font-size: 1rem; font-weight: 300; line-height: 1; }
  .day .lunar { font-size: 0.55rem; color: var(--ink-faint); margin-top: 2px; }
  .day.today { background: var(--ink); }
  .day.today .num { color: var(--paper); }
  .day.today .lunar { color: rgba(255,255,255,0.4); }
  .day.holiday .num { color: var(--red); }
  .day .tag {
    font-size: 0.48rem; border-radius: 2px; padding: 1px 3px; margin-top: 1px;
    white-space: nowrap; max-width: 90%; overflow: hidden; text-overflow: ellipsis;
  }
  .day.holiday .tag { color: var(--red); background: var(--red-soft); }
  .day.workday .num { color: var(--green); }
  .day.workday .tag { color: var(--green); background: #d4e8d8; }
  .day .jieqi { font-size: 0.5rem; color: var(--gold); margin-top: 1px; }
  .day.weekend:not(.today) .num { color: var(--accent); }
  .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--ink-light); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .divider { width: 60px; height: 1px; background: var(--ink-faint); margin: 1.5rem auto; opacity: 0.4; }
  .info-panel {
    margin-top: 0; max-width: 680px; width: 100%;
    background: var(--paper-warm); border-left: 3px solid var(--gold);
    padding: 1rem 1.5rem; border-radius: 0 4px 4px 0;
    min-height: 3.5rem; font-size: 0.85rem; color: var(--ink-light); letter-spacing: 0.05em;
  }
  .info-panel .info-title { font-size: 1rem; color: var(--ink); margin-bottom: 0.3rem; }
</style>
</head>
<body>
<a href="../../index.html" style="position:fixed;top:1rem;left:1rem;font-size:0.8rem;color:var(--ink-faint);text-decoration:none;letter-spacing:0.1em;z-index:100;">← 主页</a>
<header>
  <h1>雅　历</h1>
  <div class="subtitle">中华节假日 · 农历 · 节气</div>
</header>

<div class="nav">
  <button onclick="changeMonth(-1)">◁</button>
  <div class="month-label" id="monthLabel"></div>
  <button onclick="changeMonth(1)">▷</button>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
  </div>
  <div class="days" id="daysGrid"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2c2c2c"></div>今日</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>法定假日</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a7c59"></div>调休补班</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>节气</div>
</div>
<div class="divider"></div>
<div class="info-panel" id="infoPanel">
  <div style="color:var(--ink-faint)">点击日期查看详情</div>
</div>

<script>
const HOLIDAYS = {
  "2025-01-01":{name:"元旦"},"2025-01-28":{name:"春节"},"2025-01-29":{name:"春节"},
  "2025-01-30":{name:"春节"},"2025-01-31":{name:"春节"},"2025-02-01":{name:"春节"},
  "2025-02-02":{name:"春节"},"2025-02-03":{name:"春节"},"2025-02-04":{name:"春节"},
  "2025-04-04":{name:"清明"},"2025-04-05":{name:"清明"},"2025-04-06":{name:"清明"},
  "2025-05-01":{name:"劳动节"},"2025-05-02":{name:"劳动节"},"2025-05-03":{name:"劳动节"},
  "2025-05-04":{name:"劳动节"},"2025-05-05":{name:"劳动节"},
  "2025-05-31":{name:"端午"},"2025-06-01":{name:"端午"},"2025-06-02":{name:"端午"},
  "2025-10-01":{name:"国庆"},"2025-10-02":{name:"国庆"},"2025-10-03":{name:"国庆"},
  "2025-10-04":{name:"国庆"},"2025-10-05":{name:"国庆"},"2025-10-06":{name:"国庆/中秋"},
  "2025-10-07":{name:"国庆"},
  "2026-01-01":{name:"元旦"},
  "2026-02-17":{name:"春节"},"2026-02-18":{name:"春节"},"2026-02-19":{name:"春节"},
  "2026-02-20":{name:"春节"},"2026-02-21":{name:"春节"},"2026-02-22":{name:"春节"},
  "2026-02-23":{name:"春节"},
  "2026-04-04":{name:"清明"},"2026-04-05":{name:"清明"},"2026-04-06":{name:"清明"},
  "2026-05-01":{name:"劳动节"},"2026-05-02":{name:"劳动节"},"2026-05-03":{name:"劳动节"},
  "2026-05-04":{name:"劳动节"},"2026-05-05":{name:"劳动节"},
  "2026-06-19":{name:"端午"},"2026-06-20":{name:"端午"},"2026-06-21":{name:"端午"},
  "2026-09-25":{name:"中秋"},"2026-09-26":{name:"中秋"},"2026-09-27":{name:"中秋"},
  "2026-10-01":{name:"国庆"},"2026-10-02":{name:"国庆"},"2026-10-03":{name:"国庆"},
  "2026-10-04":{name:"国庆"},"2026-10-05":{name:"国庆"},"2026-10-06":{name:"国庆"},
  "2026-10-07":{name:"国庆"},
};
const WORKDAYS = {
  "2025-01-26":"春节调休","2025-02-08":"春节调休","2025-04-27":"劳动节调休",
  "2025-09-28":"国庆调休","2025-10-11":"国庆调休",
  "2026-02-15":"春节调休","2026-02-28":"春节调休","2026-05-09":"劳动节调休",
  "2026-10-10":"国庆调休",
};
const JIEQI = {
  "2025-01-05":"小寒","2025-01-20":"大寒","2025-02-03":"立春","2025-02-18":"雨水",
  "2025-03-05":"惊蛰","2025-03-20":"春分","2025-04-04":"清明","2025-04-20":"谷雨",
  "2025-05-05":"立夏","2025-05-21":"小满","2025-06-05":"芒种","2025-06-21":"夏至",
  "2025-07-07":"小暑","2025-07-22":"大暑","2025-08-07":"立秋","2025-08-22":"处暑",
  "2025-09-07":"白露","2025-09-22":"秋分","2025-10-08":"寒露","2025-10-23":"霜降",
  "2025-11-07":"立冬","2025-11-22":"小雪","2025-12-07":"大雪","2025-12-22":"冬至",
  "2026-01-05":"小寒","2026-01-20":"大寒","2026-02-04":"立春","2026-02-19":"雨水",
  "2026-03-06":"惊蛰","2026-03-21":"春分","2026-04-05":"清明","2026-04-20":"谷雨",
  "2026-05-05":"立夏","2026-05-21":"小满","2026-06-06":"芒种","2026-06-21":"夏至",
  "2026-07-07":"小暑","2026-07-23":"大暑","2026-08-07":"立秋","2026-08-23":"处暑",
  "2026-09-08":"白露","2026-09-23":"秋分","2026-10-08":"寒露","2026-10-23":"霜降",
  "2026-11-07":"立冬","2026-11-22":"小雪","2026-12-07":"大雪","2026-12-22":"冬至",
};

const today = new Date();
let curYear = today.getFullYear(), curMonth = today.getMonth();

function pad(n){ return String(n).padStart(2,'0'); }
function key(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

function getLunar(date){
  try {
    const fmt = new Intl.DateTimeFormat('zh-CN-u-ca-chinese',{month:'long',day:'numeric'});
    const parts = fmt.formatToParts(date);
    let month='', day='';
    for(const p of parts){
      if(p.type==='month') month=p.value;
      if(p.type==='day') day=p.value;
    }
    return day==='初一' ? month+'月' : day;
  } catch(e){ return ''; }
}

function render(){
  document.getElementById('monthLabel').textContent = `${curYear} 年 ${curMonth+1} 月`;
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div'); el.className='day empty'; grid.appendChild(el);
  }
  for(let d=1;d<=daysInMonth;d++){
    const k=key(curYear,curMonth,d);
    const date=new Date(curYear,curMonth,d);
    const dow=date.getDay();
    const isToday=(curYear===today.getFullYear()&&curMonth===today.getMonth()&&d===today.getDate());
    const holiday=HOLIDAYS[k], workday=WORKDAYS[k], jieqi=JIEQI[k];
    const isWeekend=(dow===0||dow===6)&&!workday;
    const lunar=getLunar(date);

    const el=document.createElement('div');
    let cls='day';
    if(isToday) cls+=' today';
    else if(holiday) cls+=' holiday';
    else if(workday) cls+=' workday';
    else if(isWeekend) cls+=' weekend';
    el.className=cls;

    el.innerHTML=`<span class="num">${d}</span><span class="lunar">${lunar}</span>`
      +(jieqi?`<span class="jieqi">${jieqi}</span>`:'')
      +(holiday&&!isToday?`<span class="tag">${holiday.name}</span>`:'')
      +(workday&&!isToday?`<span class="tag">班</span>`:'');

    el.addEventListener('click',()=>showInfo(date,k,holiday,workday,jieqi,lunar));
    grid.appendChild(el);
  }
}

function showInfo(date,k,holiday,workday,jieqi,lunar){
  const weeks=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  let html=`<div class="info-title">${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日　${weeks[date.getDay()]}</div>`;
  html+=`<div style="margin-top:0.3rem;color:var(--ink-faint)">农历 ${lunar}</div>`;
  if(jieqi) html+=`<div style="margin-top:0.3rem;color:var(--gold)">节气：${jieqi}</div>`;
  if(holiday) html+=`<div style="margin-top:0.3rem;color:var(--red)">法定假日：${holiday.name}</div>`;
  if(workday) html+=`<div style="margin-top:0.3rem;color:var(--green)">调休补班：${workday}</div>`;
  document.getElementById('infoPanel').innerHTML=html;
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
  document.getElementById('infoPanel').innerHTML='<div style="color:var(--ink-faint)">点击日期查看详情</div>';
}

render();
</script>
</body>
</html>
