<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muna — March 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: oklch(97% 0.008 60);
    --surface: oklch(99% 0.005 60);
    --ink: oklch(22% 0.02 60);
    --ink-soft: oklch(55% 0.015 60);
    --ink-muted: oklch(72% 0.010 60);
    --period-bg: oklch(96% 0.025 22);
    --period-dot: oklch(62% 0.16 22);
    --today-ring: oklch(55% 0.12 250);
    --border: oklch(90% 0.008 60);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .app {
    width: 100%;
    max-width: 390px;
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 56px 24px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-left .subtitle {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 300;
    margin-top: 5px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: oklch(88% 0.06 320);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .phase-bar { padding: 0 24px 20px; }

  .phase-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 7px 14px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .phase-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--period-dot);
  }

  .phase-pill strong { color: var(--ink); font-weight: 500; }

  .calendar-card {
    margin: 0 16px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px;
  }

  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
  }

  .nav-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 13px;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--bg); }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 10px;
    margin-bottom: 4px;
  }

  .weekday {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 4px 0;
  }
  .weekday.sun { color: var(--period-dot); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 10px 14px;
    gap: 2px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    position: relative;
    cursor: pointer;
    transition: background 0.12s;
    padding: 2px;
  }

  .day-cell:hover { background: var(--bg); }

  .day-cell.period {
    background: var(--period-bg);
  }
  .day-cell.period:hover { background: oklch(94% 0.035 22); }

  .day-cell.period::before {
    content: '';
    position: absolute;
    left: 0; top: 22%; bottom: 22%;
    width: 2.5px;
    border-radius: 0 2px 2px 0;
    background: var(--period-dot);
    opacity: 0.65;
  }

  .day-num {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
  }

  .day-cell.today .day-num {
    background: var(--today-ring);
    color: white;
    border-radius: 50%;
    width: 18px; height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  .day-cell.other-month { opacity: 0.3; }
  .day-cell.future .mood-face { opacity: 0; }

  .mood-face {
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .legend-period {
    width: 10px; height: 10px;
    border-radius: 3px;
    background: var(--period-bg);
    border-left: 2px solid var(--period-dot);
  }

  .legend-today {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--today-ring);
  }

  .legend-faces {
    margin-left: auto;
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .legend-faces svg { width: 14px; height: 14px; }

  .mood-summary {
    margin: 14px 16px 0;
    padding: 16px 20px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mood-summary-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }

  .mood-summary-face { width: 28px; height: 28px; margin-bottom: 4px; }

  .mood-summary-note {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 300;
  }

  .mood-bar { display: flex; gap: 4px; align-items: flex-end; }
  .mood-bar-col {
    width: 9px;
    border-radius: 4px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .mood-bar-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-radius: 4px;
  }

  .log-button {
    margin: 14px 16px 32px;
    width: calc(100% - 32px);
    padding: 15px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s;
  }
  .log-button:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>March</h1>
      <div class="subtitle">Luteal phase · Day 4</div>
    </div>
    <div class="avatar">🌙</div>
  </div>

  <div class="phase-bar">
    <div class="phase-pill">
      <div class="phase-dot"></div>
      Period ends in <strong>2 days</strong> · Next cycle Mar 28
    </div>
  </div>

  <div class="calendar-card">
    <div class="month-nav">
      <button class="nav-btn">‹</button>
      <span class="month-label">March 2026</span>
      <button class="nav-btn">›</button>
    </div>

    <div class="weekdays">
      <div class="weekday">M</div>
      <div class="weekday">T</div>
      <div class="weekday">W</div>
      <div class="weekday">T</div>
      <div class="weekday">F</div>
      <div class="weekday">S</div>
      <div class="weekday sun">S</div>
    </div>

    <div class="days-grid" id="grid"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-period"></div>
        <span>Period</span>
      </div>
      <div class="legend-item">
        <div class="legend-today"></div>
        <span>Today</span>
      </div>
      <div class="legend-faces" id="legendFaces"></div>
    </div>
  </div>

  <div class="mood-summary">
    <div>
      <div class="mood-summary-label">This month</div>
      <svg class="mood-summary-face" id="summaryFace" viewBox="0 0 24 24"></svg>
      <div class="mood-summary-note">Mostly okay · 13 days logged</div>
    </div>
    <div class="mood-bar" id="moodBar"></div>
  </div>

  <button class="log-button">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
      <line x1="8" y1="4.5" x2="8" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4.5" y1="8" x2="11.5" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Log today's mood
  </button>

</div>

<script>
// ── SVG face generator ──────────────────────────────────────────
// mood: 0=very sad, 1=sad, 2=neutral, 3=happy, 4=very happy
const FACE_COLORS = [
  { bg: '#f5cfc8', stroke: '#c0594a', cheek: null },       // very sad - muted red
  { bg: '#fad9c2', stroke: '#c47840', cheek: null },       // sad - warm peach
  { bg: '#f5edda', stroke: '#a08060', cheek: null },       // neutral - warm beige
  { bg: '#d4ecd4', stroke: '#4a9060', cheek: '#b8e0b8' }, // happy - soft green
  { bg: '#fde8c8', stroke: '#c07830', cheek: '#ffd0a0' }, // very happy - golden
];

function makeFaceSVG(mood, size = 18) {
  const c = FACE_COLORS[mood];
  const r = size / 2;
  const cx = r, cy = r;
  const eyeY = cy - r * 0.15;
  const eyeX = r * 0.3;
  const eyeR = r * 0.08;

  // Mouth curves per mood
  const mouthY = cy + r * 0.22;
  const mouthW = r * 0.38;

  let mouth = '';
  let eyebrows = '';
  let extras = '';

  if (mood === 0) {
    // very sad: deep frown + worried brows
    mouth = `<path d="M${cx-mouthW} ${mouthY+r*0.12} Q${cx} ${mouthY-r*0.18} ${cx+mouthW} ${mouthY+r*0.12}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>`;
    eyebrows = `
      <path d="M${cx-eyeX-r*0.14} ${eyeY-r*0.24} Q${cx-eyeX} ${eyeY-r*0.32} ${cx-eyeX+r*0.14} ${eyeY-r*0.24}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.09}" stroke-linecap="round"/>
      <path d="M${cx+eyeX-r*0.14} ${eyeY-r*0.24} Q${cx+eyeX} ${eyeY-r*0.32} ${cx+eyeX+r*0.14} ${eyeY-r*0.24}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.09}" stroke-linecap="round"/>
    `;
    // tear
    extras = `<ellipse cx="${cx-eyeX+r*0.04}" cy="${eyeY+r*0.26}" rx="${r*0.065}" ry="${r*0.09}" fill="${c.stroke}" opacity="0.4"/>`;
  } else if (mood === 1) {
    // sad: slight frown
    mouth = `<path d="M${cx-mouthW} ${mouthY+r*0.06} Q${cx} ${mouthY-r*0.10} ${cx+mouthW} ${mouthY+r*0.06}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>`;
    eyebrows = `
      <path d="M${cx-eyeX-r*0.12} ${eyeY-r*0.22} L${cx-eyeX+r*0.12} ${eyeY-r*0.18}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.08}" stroke-linecap="round"/>
      <path d="M${cx+eyeX-r*0.12} ${eyeY-r*0.18} L${cx+eyeX+r*0.12} ${eyeY-r*0.22}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.08}" stroke-linecap="round"/>
    `;
  } else if (mood === 2) {
    // neutral: flat line
    mouth = `<line x1="${cx-mouthW}" y1="${mouthY}" x2="${cx+mouthW}" y2="${mouthY}" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>`;
  } else if (mood === 3) {
    // happy: smile
    mouth = `<path d="M${cx-mouthW} ${mouthY-r*0.04} Q${cx} ${mouthY+r*0.20} ${cx+mouthW} ${mouthY-r*0.04}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>`;
    if (c.cheek) {
      extras = `
        <circle cx="${cx-eyeX-r*0.1}" cy="${eyeY+r*0.32}" r="${r*0.13}" fill="${c.cheek}" opacity="0.7"/>
        <circle cx="${cx+eyeX+r*0.1}" cy="${eyeY+r*0.32}" r="${r*0.13}" fill="${c.cheek}" opacity="0.7"/>
      `;
    }
  } else {
    // very happy: big smile + closed happy eyes + cheeks
    mouth = `<path d="M${cx-mouthW} ${mouthY-r*0.06} Q${cx} ${mouthY+r*0.26} ${cx+mouthW} ${mouthY-r*0.06}" fill="${c.stroke}" opacity="0.15" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>`;
    // closed arc eyes
    const eyeSVG = `
      <path d="M${cx-eyeX-r*0.12} ${eyeY} Q${cx-eyeX} ${eyeY-r*0.18} ${cx-eyeX+r*0.12} ${eyeY}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>
      <path d="M${cx+eyeX-r*0.12} ${eyeY} Q${cx+eyeX} ${eyeY-r*0.18} ${cx+eyeX+r*0.12} ${eyeY}" fill="none" stroke="${c.stroke}" stroke-width="${r*0.10}" stroke-linecap="round"/>
    `;
    if (c.cheek) {
      extras = eyeSVG + `
        <circle cx="${cx-eyeX-r*0.08}" cy="${eyeY+r*0.34}" r="${r*0.14}" fill="${c.cheek}" opacity="0.8"/>
        <circle cx="${cx+eyeX+r*0.08}" cy="${eyeY+r*0.34}" r="${r*0.14}" fill="${c.cheek}" opacity="0.8"/>
      `;
    } else {
      extras = eyeSVG;
    }
  }

  const normalEyes = (mood < 4) ? `
    <circle cx="${cx-eyeX}" cy="${eyeY}" r="${eyeR}" fill="${c.stroke}"/>
    <circle cx="${cx+eyeX}" cy="${eyeY}" r="${eyeR}" fill="${c.stroke}"/>
  ` : '';

  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r-0.5}" fill="${c.bg}"/>
    ${extras}
    ${normalEyes}
    ${mouth}
    ${eyebrows}
  </svg>`;
}

// ── Data ──────────────────────────────────────────────────────
const data = {
  1:{mood:2,period:false}, 2:{mood:1,period:false}, 3:{mood:0,period:false},
  4:{mood:1,period:false}, 5:{mood:2,period:false}, 6:{mood:3,period:false},
  7:{mood:3,period:false}, 8:{mood:2,period:true},  9:{mood:1,period:true},
  10:{mood:1,period:true}, 11:{mood:2,period:true}, 12:{mood:2,period:true},
  13:{mood:null,period:true}, // today
};
const TODAY = 13;

// ── Build calendar grid ────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  const firstDay = new Date(2026, 2, 1).getDay();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;

  for (let i = startOffset - 1; i >= 0; i--) {
    grid.appendChild(makeCell(28 - i, false, false, true, null, false));
  }
  for (let d = 1; d <= 31; d++) {
    const e = data[d] || null;
    grid.appendChild(makeCell(d, e?.period||false, d===TODAY, false, e?.mood??null, d>TODAY));
  }
  const total = startOffset + 31;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= rem; d++) {
    grid.appendChild(makeCell(d, false, false, true, null, false));
  }
}

function makeCell(day, isPeriod, isToday, isOther, mood, isFuture) {
  const cell = document.createElement('div');
  cell.className = 'day-cell';
  if (isPeriod && !isOther) cell.classList.add('period');
  if (isToday) cell.classList.add('today');
  if (isOther) cell.classList.add('other-month');
  if (isFuture) cell.classList.add('future');

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = day;

  const face = document.createElement('div');
  face.className = 'mood-face';

  if (mood !== null && !isOther && !isFuture) {
    face.innerHTML = makeFaceSVG(mood, 18);
  } else if (isFuture || (isToday && mood === null)) {
    // dot placeholder
    face.innerHTML = `<svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="1.5" fill="oklch(72% 0.010 60)" opacity="0.4"/></svg>`;
  }

  cell.appendChild(num);
  cell.appendChild(face);
  return cell;
}

// ── Legend faces ───────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legendFaces');
  for (let i = 0; i < 5; i++) {
    const wrap = document.createElement('span');
    wrap.style.display = 'inline-flex';
    wrap.innerHTML = makeFaceSVG(i, 14);
    el.appendChild(wrap);
  }
}

// ── Summary face ───────────────────────────────────────────────
function buildSummary() {
  document.getElementById('summaryFace').outerHTML =
    `<div style="width:28px;height:28px;flex-shrink:0" id="summaryFace">${makeFaceSVG(2, 28)}</div>`;
}

// ── Mood bar ───────────────────────────────────────────────────
function buildMoodBar() {
  const bar = document.getElementById('moodBar');
  const counts = [0,0,0,0,0];
  for (let d = 1; d <= 12; d++) {
    if (data[d]?.mood !== null && data[d]?.mood !== undefined) counts[data[d].mood]++;
  }
  const max = Math.max(...counts);
  const H = 40;
  counts.forEach((c, i) => {
    const col = document.createElement('div');
    col.className = 'mood-bar-col';
    col.style.height = H + 'px';
    const fill = document.createElement('div');
    fill.className = 'mood-bar-fill';
    fill.style.height = (max > 0 ? Math.round(c / max * H) : 0) + 'px';
    fill.style.background = FACE_COLORS[i].stroke;
    fill.style.opacity = '0.6';
    col.appendChild(fill);
    bar.appendChild(col);
  });
}

buildGrid();
buildLegend();
buildSummary();
buildMoodBar();
</script>
</body>
</html>
