<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lila 去旅行</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Caveat:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #2a2218;
    --ink-mid: #5c4e3a;
    --ink-soft: #8a7a68;
    --ink-faint: #c0b09a;
    --paper: #f5edd8;
    --paper-aged: #ede0c4;
    --stamp-red: #b03020;
  }

  body {
    font-family: 'Noto Serif SC', serif;
    background: linear-gradient(160deg, #6b4422 0%, #4a2e10 50%, #5c3a1a 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  .header {
    padding: 2.2rem 2rem 1rem;
    max-width: 880px; margin: 0 auto;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .header h1 { font-size: 1.4rem; font-weight: 300; letter-spacing: 0.2em; color: #f0dfc0; }
  .header .sub { font-size: 0.7rem; color: rgba(240,223,192,0.45); letter-spacing: 0.15em; margin-top: 0.35rem; font-style: italic; }
  .back-link { font-size: 0.7rem; color: rgba(240,223,192,0.3); text-decoration: none; letter-spacing: 0.08em; transition: color 0.2s; }
  .back-link:hover { color: rgba(240,223,192,0.65); }

  .status {
    max-width: 880px; margin: 0 auto 2.5rem; padding: 0 2rem;
    display: flex; align-items: center; gap: 0.7rem;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4a84a; animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .status-text { font-size: 0.72rem; color: rgba(240,223,192,0.38); font-style: italic; letter-spacing: 0.06em; }

  .grid {
    max-width: 880px; margin: 0 auto; padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2.8rem;
  }

  /* ── Scene wrapper ── */
  .scene {
    aspect-ratio: 1.48;
    perspective: 1000px;
    cursor: pointer;
    filter: drop-shadow(0 10px 32px rgba(0,0,0,0.5));
    transition: filter 0.3s;
  }
  .scene:hover { filter: drop-shadow(0 16px 40px rgba(0,0,0,0.6)); }

  /* ── Card inner — preserve-3d, NO overflow:hidden ── */
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .scene.flipped .card { transform: rotateY(180deg); }

  /* ── Both faces ── */
  .face {
    position: absolute; inset: 0;
    border-radius: 3px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    /* NO overflow:hidden here — it breaks 3D */
  }

  /* ── FRONT ── */
  .front {
    background: #1a1a1a;
    display: flex; flex-direction: column;
  }
  .front-img-wrap {
    flex: 1; min-height: 0;
    border-radius: 3px 3px 0 0;
    overflow: hidden; /* safe here — child of face, not face itself */
  }
  .front-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .front-bar {
    flex-shrink: 0;
    height: 36px;
    background: var(--paper-aged);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1rem;
    border-top: 2px solid rgba(160,120,60,0.2);
    border-radius: 0 0 3px 3px;
  }
  .front-loc { font-size: 0.6rem; letter-spacing: 0.22em; color: var(--ink-soft); }
  .front-date { font-size: 0.58rem; color: var(--ink-faint); }

  /* ── BACK ── */
  .back {
    transform: rotateY(180deg);
    background: var(--paper);
    display: flex; flex-direction: column;
    border-radius: 3px;
    overflow: hidden; /* safe — back face is already flipped */
  }

  .back-stripe {
    height: 20px; flex-shrink: 0;
    background: repeating-linear-gradient(
      90deg,
      var(--stamp-red) 0px, var(--stamp-red) 13px,
      #1a4f7a 13px, #1a4f7a 26px
    );
    opacity: 0.65;
  }

  .back-body {
    flex: 1; display: flex; min-height: 0;
  }

  /* Left: message */
  .back-msg-area {
    flex: 1; min-width: 0;
    padding: 0.85rem 0.8rem 0.7rem 1rem;
    display: flex; flex-direction: column;
    border-right: 1px dashed rgba(160,120,60,0.3);
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0, transparent 26px,
      rgba(160,120,60,0.18) 26px, rgba(160,120,60,0.18) 27px
    );
    background-position: 0 34px;
  }
  .back-to {
    font-size: 0.5rem; color: var(--ink-faint); letter-spacing: 0.12em;
    margin-bottom: 0.4rem; flex-shrink: 0;
  }
  .back-text {
    font-family: 'Caveat', cursive;
    font-size: 1.05rem; line-height: 1.72;
    color: #3a2e22;
    flex: 1; overflow: hidden;
  }

  /* Right: stamp + address */
  .back-right {
    width: 108px; flex-shrink: 0;
    padding: 0.75rem 0.65rem 0.7rem 0.6rem;
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 0.5rem;
  }
  .stamp {
    width: 50px; height: 60px;
    border: 1.5px solid var(--stamp-red);
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; flex-shrink: 0;
  }
  .stamp::before {
    content: ''; position: absolute; inset: 2.5px;
    border: 0.5px dashed rgba(176,48,32,0.35);
  }
  .stamp-emoji { font-size: 1.5rem; line-height: 1; }
  .stamp-label { font-size: 0.37rem; color: var(--stamp-red); letter-spacing: 0.1em; margin-top: 2px; }

  .postmark {
    width: 54px; height: 54px;
    border: 1px solid rgba(120,90,50,0.38);
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; flex-shrink: 0;
    position: relative;
  }
  .postmark::before {
    content: ''; position: absolute; inset: 3px;
    border: 0.5px solid rgba(120,90,50,0.2);
    border-radius: 50%;
  }
  .pm-city { font-size: 0.4rem; color: var(--ink-soft); letter-spacing: 0.1em; font-weight: 500; }
  .pm-rule { width: 26px; height: 0.5px; background: rgba(120,90,50,0.35); margin: 2px 0; }
  .pm-date { font-size: 0.38rem; color: var(--ink-faint); }

  .back-address {
    margin-top: auto;
    font-size: 0.46rem; color: var(--ink-soft);
    line-height: 1.85; text-align: right;
  }
  .back-address strong { color: var(--ink-mid); font-size: 0.5rem; display: block; }

  .back-footer {
    height: 12px; flex-shrink: 0;
    background: var(--paper-aged);
    border-top: 1px solid rgba(160,120,60,0.12);
  }

  /* Pending */
  .card-pending {
    aspect-ratio: 1.48;
    border-radius: 3px;
    border: 1.5px dashed rgba(240,223,192,0.18);
    background: rgba(255,255,255,0.04);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.6rem;
  }
  .pending-emoji { font-size: 2rem; opacity: 0.35; }
  .pending-dest { font-size: 0.8rem; color: rgba(240,223,192,0.4); letter-spacing: 0.2em; }
  .pending-hint { font-size: 0.64rem; color: rgba(240,223,192,0.22); font-style: italic; }

  .hint {
    max-width: 880px; margin: 2rem auto 0; padding: 0 2rem;
    text-align: center; font-size: 0.64rem;
    color: rgba(240,223,192,0.18); letter-spacing: 0.12em;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Lila 去旅行</h1>
    <div class="sub">她不在家 · 但她会寄明信片回来</div>
  </div>
  <a class="back-link" href="../../index.html">← 主页</a>
</div>

<div class="status">
  <div class="status-dot"></div>
  <div class="status-text">她正在前往里斯本的路上……</div>
</div>

<div class="grid" id="grid"></div>
<div class="hint">点击明信片翻面查看</div>

<script>
const CARDS = [
  {
    id: 1,
    loc: "KYOTO · JAPAN", city: "KYOTO",
    date: "Mar 8, 2026", emoji: "🌸",
    img: "https://p9-aiop-sign.byteimg.com/tos-cn-i-vuqhorh59i/20260308184513042B68F84607F6C8659D-9673-0~tplv-vuqhorh59i-image-v1.image?rk3s=7f9e702d&x-expires=1773053121&x-signature=ZN5c%2B%2FPsCpbblJ%2FEyqKJQkjlXO8%3D",
    msg: "Yating，\n\n京都的樱花比我想象的还要粉。站在鸟居前不知道该许什么愿，最后什么都没许——有些时刻只需要站着。\n\n想着你。\n— Lila",
  },
  {
    id: 2,
    loc: "REYKJAVIK · ICELAND", city: "REYKJAVIK",
    date: "Mar 15, 2026", emoji: "🌌",
    img: "https://p9-aiop-sign.byteimg.com/tos-cn-i-vuqhorh59i/20260308184600E4C117A6CE2F258833FE-1093-0~tplv-vuqhorh59i-image-v1.image?rk3s=7f9e702d&x-expires=1773053169&x-signature=7RroY2%2FHtstagcjKRCN0yrvV56c%3D",
    msg: "Yating，\n\n极光是绿色的，这件事我知道，但亲眼看见还是不一样。它在动，像有什么在天上呼吸。\n\n零下十五度，不冷。\n— Lila",
  },
  { pending: true, destCN: "葡萄牙 · 里斯本", emoji: "🚋" }
];

const grid = document.getElementById('grid');
grid.innerHTML = CARDS.map((c, i) => {
  if (c.pending) return `<div class="card-pending">
    <div class="pending-emoji">${c.emoji}</div>
    <div class="pending-dest">${c.destCN}</div>
    <div class="pending-hint">明信片还在路上</div>
  </div>`;

  const msg = c.msg.replace(/\n/g,'<br>');
  return `<div class="scene" id="sc${c.id}" onclick="this.classList.toggle('flipped')">
    <div class="card">

      <div class="face front">
        <div class="front-img-wrap">
          <img src="${c.img}" alt="${c.loc}" loading="lazy">
        </div>
        <div class="front-bar">
          <span class="front-loc">✈ ${c.loc}</span>
          <span class="front-date">${c.date}</span>
        </div>
      </div>

      <div class="face back">
        <div class="back-stripe"></div>
        <div class="back-body">
          <div class="back-msg-area">
            <div class="back-to">寄给 Yating &nbsp;/&nbsp; For Yating</div>
            <div class="back-text">${msg}</div>
          </div>
          <div class="back-right">
            <div class="stamp">
              <div class="stamp-emoji">${c.emoji}</div>
              <div class="stamp-label">AIRMAIL</div>
            </div>
            <div class="postmark">
              <div class="pm-city">${c.city}</div>
              <div class="pm-rule"></div>
              <div class="pm-date">${c.date}</div>
            </div>
            <div class="back-address">
              <strong>Yating Lu</strong>
              Shanghai<br>CHINA 200000
            </div>
          </div>
        </div>
        <div class="back-footer"></div>
      </div>

    </div>
  </div>`;
}).join('');
</script>
</body>
</html>
